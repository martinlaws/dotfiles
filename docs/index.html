<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>New Mac · Launch Sequence</title>
<style>
  :root{
    --bg:#0e1016; --bg2:#151823; --card:#181c28; --line:#262b3a;
    --ink:#e8ebf2; --dim:#9aa3b8; --faint:#646d85;
    --a1:#ff8a5b; --a2:#ff5c8a; --a3:#a06bff; --ok:#37d399;
    --radius:16px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:radial-gradient(1200px 700px at 80% -10%, #1c2030 0, var(--bg) 55%);
    color:var(--ink); font:16px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; padding-bottom:120px;
  }
  a{color:var(--a2)}
  .wrap{max-width:760px; margin:0 auto; padding:0 20px}

  /* ---- hero ---- */
  header.hero{padding:64px 20px 28px; text-align:center}
  .kicker{letter-spacing:.32em; text-transform:uppercase; font-size:12px; color:var(--faint); font-weight:600}
  h1{margin:.3em 0 .15em; font-size:clamp(34px,7vw,54px); line-height:1.02; font-weight:800;
     background:linear-gradient(100deg,var(--a1),var(--a2) 45%,var(--a3));
     -webkit-background-clip:text; background-clip:text; color:transparent}
  .sub{color:var(--dim); max-width:46ch; margin:.4em auto 0}

  /* ---- sticky progress ---- */
  .progwrap{position:sticky; top:0; z-index:20; backdrop-filter:blur(10px);
    background:linear-gradient(var(--bg),rgba(14,16,22,.72)); border-bottom:1px solid var(--line)}
  .prog{max-width:760px; margin:0 auto; padding:12px 20px; display:flex; align-items:center; gap:14px}
  .bar{flex:1; height:10px; border-radius:99px; background:#222838; overflow:hidden}
  .fill{height:100%; width:0; border-radius:99px; background:linear-gradient(90deg,var(--a1),var(--a2),var(--a3)); transition:width .45s cubic-bezier(.2,.8,.2,1)}
  .pct{font-variant-numeric:tabular-nums; font-weight:700; min-width:3.2em; text-align:right}
  .count{color:var(--faint); font-size:13px; min-width:7.5em}
  .reset{margin-left:auto; background:none; border:1px solid var(--line); color:var(--dim);
    border-radius:99px; padding:5px 12px; font-size:12px; cursor:pointer}
  .reset:hover{color:var(--ink); border-color:var(--faint)}

  /* ---- phases ---- */
  .phase{margin:30px 0; background:linear-gradient(var(--card),var(--bg2));
    border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
  .phead{display:flex; gap:14px; align-items:center; padding:18px 20px; border-bottom:1px solid var(--line)}
  .badge{flex:none; width:34px; height:34px; border-radius:10px; display:grid; place-items:center;
    font-weight:800; font-size:15px; color:#0e1016; background:linear-gradient(135deg,var(--a1),var(--a2))}
  .ptitle{font-weight:700; font-size:18px}
  .psub{color:var(--faint); font-size:13px; margin-top:1px}
  .phase.done .badge{background:linear-gradient(135deg,var(--ok),#26b888)}
  .phase.done .badge::after{content:"✓"}
  .phase.done .badge span{display:none}

  /* ---- items ---- */
  ul{list-style:none; margin:0; padding:6px 0}
  li.item{display:flex; gap:13px; padding:11px 20px; align-items:flex-start; transition:opacity .2s}
  li.item+li.item{border-top:1px solid #1d2230}
  .box{flex:none; margin-top:2px; width:22px; height:22px; border-radius:7px; border:2px solid #3a4156; cursor:pointer;
    background:#10131c; display:grid; place-items:center; transition:.15s}
  .box:hover{border-color:var(--a2)}
  .box svg{width:13px; height:13px; opacity:0; transform:scale(.5); transition:.18s; stroke:#0e1016; stroke-width:3.5; fill:none}
  .item.checked .box{background:linear-gradient(135deg,var(--a1),var(--a2)); border-color:transparent}
  .item.checked .box svg{opacity:1; transform:scale(1)}
  .body{flex:1; min-width:0}
  .txt{cursor:pointer}
  .item.checked .txt{color:var(--faint); text-decoration:line-through; text-decoration-color:#3a4156}
  .note{color:var(--dim); font-size:13.5px; margin-top:3px}
  .note code{background:#0c0f17; padding:1px 5px; border-radius:5px; font-size:12.5px; color:#cdd5e8}

  /* ---- code ---- */
  .code{position:relative; margin:9px 0 2px; background:#0b0e15; border:1px solid #20263a;
    border-radius:10px; font:13px/1.6 ui-monospace,"SF Mono",Menlo,monospace; color:#cdd5e8}
  .code pre{margin:0; padding:11px 44px 11px 13px; overflow-x:auto; white-space:pre}
  .copy{position:absolute; top:7px; right:7px; border:1px solid #2a3145; background:#141926; color:var(--dim);
    border-radius:7px; padding:3px 9px; font-size:11px; cursor:pointer; font-family:inherit}
  .copy:hover{color:var(--ink)}
  .copy.copied{color:var(--ok); border-color:var(--ok)}

  /* ---- done banner ---- */
  .finale{margin:34px 0; text-align:center; padding:30px 22px; border-radius:var(--radius);
    border:1px solid var(--line); background:linear-gradient(135deg,rgba(255,138,91,.1),rgba(160,107,255,.1));
    opacity:.4; transition:opacity .4s}
  .finale.on{opacity:1; border-color:var(--a3)}
  .finale h2{margin:0 0 6px; font-size:24px}
  .finale p{color:var(--dim); margin:0}
  footer{text-align:center; color:var(--faint); font-size:13px; margin-top:30px}
  canvas#cf{position:fixed; inset:0; pointer-events:none; z-index:50}
</style>
</head>
<body>
<div class="progwrap">
  <div class="prog">
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="pct" id="pct">0%</div>
    <div class="count" id="count">0 / 0</div>
    <button class="reset" id="reset">reset</button>
  </div>
</div>

<header class="hero">
  <div class="kicker">Low Tide · Setup as Code</div>
  <h1>New Mac<br>Launch Sequence</h1>
  <p class="sub">The follow-along for bringing up the MacBook Pro. Check things off as you go — your progress saves in this browser. Tap any command to copy it.</p>
</header>

<main class="wrap" id="app"></main>
<canvas id="cf"></canvas>

<script>
const PHASES = [
  { t:"Before you wipe the old Mac", s:"These live only on the old machine — back them up first.", items:[
    { id:"brain", x:"Back up the Claude brain", n:"Commits today's memory + config to the private claude-config repo. Without this, the new Mac's Claude has amnesia.",
      c:'cd ~/.claude && git add -A && git commit -m "backup before migration" && git push' },
    { id:"code", x:"Push every ~/code repo with work in it", n:"Lists any repo with uncommitted or unpushed changes — commit/push each (or copy off anything with no remote).",
      c:'for d in ~/code/*/; do [ -d "$d/.git" ] || continue; s=$(git -C "$d" status --porcelain|wc -l|tr -d " "); u=$(git -C "$d" log @{u}.. --oneline 2>/dev/null|wc -l|tr -d " "); [ "$s" != 0 -o "$u" != 0 ] && echo "$(basename "$d"): dirty=$s unpushed=${u:-no-remote}"; done' },
    { id:"sw", x:"Confirm superwhisper modes are in the iCloud backup", n:"iCloud Drive → mac-migration/superwhisper/ (refreshed automatically; just confirm it synced)." },
    { id:"ray", x:"Confirm Raycast Cloud Sync shows a recent date", n:"Raycast → Settings → Cloud Sync. Snippets + hotkeys restore from there." },
    { id:"1p-old", x:"Confirm 1Password is unlocked & holds the SSH key", n:"It's the linchpin for everything downstream." },
  ]},
  { t:"First boot", s:"Brand-new macOS, nothing installed yet.", items:[
    { id:"boot", x:"Finish Setup Assistant — Apple ID, Wi-Fi, FileVault ON" },
    { id:"term", x:"Open Terminal (Spotlight → “Terminal”)" },
  ]},
  { t:"1Password — the linchpin", s:"Your SSH key and your secrets both live here.", items:[
    { id:"1p", x:"Install 1Password from 1password.com and sign in" },
    { id:"agent", x:"Turn on the SSH agent", n:"Settings → Developer → Use the SSH agent. Your key's already on GitHub, so no keygen needed." },
  ]},
  { t:"Clone + run", s:"One command brings up the whole machine.", items:[
    { id:"clone", x:"Clone the dotfiles and run setup",
      c:'git clone https://github.com/martinlaws/dotfiles.git ~/dotfiles && cd ~/dotfiles && sh setup' },
    { id:"xcode", x:"Accept the Xcode Command Line Tools dialog when it pops", n:"Then wait — setup continues through its four phases." },
    { id:"prompts", x:"Answer the prompts", n:"Git identity · SSH (detects the 1Password key, skips keygen) · Apps → “Install all” · accept the macOS defaults." },
  ]},
  { t:"App Store + re-auth", s:"The few credentials that don't migrate.", items:[
    { id:"mas", x:"Sign into the App Store, then install MAS apps",
      c:'brew bundle --file=config/Brewfile.mas' },
    { id:"cc", x:"Launch Claude Code → sign in", n:"Regenerates its own credentials. The ~/.claude brain is already restored by setup." },
    { id:"gh", x:"Authenticate the GitHub CLI", c:'gh auth login' },
    { id:"mcp", x:"Re-add any MCP servers", n:"Machine-local, not tracked." },
  ]},
  { t:"Restore the app configs the repo can't carry", s:"Private data or vendor cloud — restore by hand.", items:[
    { id:"sw-restore", x:"superwhisper — launch once, then copy modes + vocabulary back",
      c:'SRC="$HOME/Library/Mobile Documents/com~apple~CloudDocs/mac-migration/superwhisper"\ncp -R "$SRC/modes/"*    ~/Documents/superwhisper/modes/\ncp -R "$SRC/settings/"* ~/Documents/superwhisper/settings/' },
    { id:"ray-restore", x:"Raycast — sign in (Cloud Sync restores everything); re-grant Accessibility" },
    { id:"browsers", x:"Comet — sign in. Perplexity — manual download (no cask)." },
    { id:"fda", x:"Grant Claude Code Full Disk Access when first prompted", n:"This is what makes /slurp work — it reads ~/Documents/superwhisper. (System Settings → Privacy & Security → Full Disk Access.)" },
  ]},
  { t:"Secrets — per project", s:"Restore as you start working in each, not all at once.", items:[
    { id:"vercel", x:"Vercel-linked projects (.vercel/project.json present)", c:'vercel link && vercel env pull' },
    { id:"op-keys", x:"Everything else — copy keys from 1Password into the project's .env.local", n:"See SECRETS.md for the key list." },
  ]},
  { t:"Manual tweaks", s:"The handful macOS won't let setup script.", items:[
    { id:"caps", x:"Caps Lock → Esc", n:"System Settings → Keyboard → Keyboard Shortcuts → Modifier Keys." },
    { id:"morning", x:"Confirm your morning routine task is present in the Claude desktop app", n:"Re-create the scheduled task if it didn't carry over." },
    { id:"aero", x:"AeroSpace — when you're ready", n:"Grant Accessibility, and turn OFF “automatically rearrange Spaces” (Desktop & Dock). Then alt-1..4 jumps contexts. Adopt when settled, not day one." },
  ]},
  { t:"Verify it worked", s:"Quick smoke test.", items:[
    { id:"v-shell", x:"Fresh shell + core tools", c:'exec zsh\nnode --version\nz ~\nssh -T git@github.com' },
    { id:"v-cc", x:"Open Claude Code in chaos — statusline renders, skills load" },
    { id:"v-slurp", x:"Say something via superwhisper Capture (opt+/), then run /slurp — it lands in _inbox.md" },
    { id:"v-auto", x:"Edit a chaos file, wait ~90s — the autosave branch updates on GitHub" },
  ]},
  { t:"Later — deferred", s:"No rush.", items:[
    { id:"tm", x:"Time Machine → Mac Studio", n:"Share a drive on the Studio as a Time Machine destination; the laptop backs up over the LAN when home." },
    { id:"aero2", x:"Adopt AeroSpace tiling once the workspaces feel natural" },
  ]},
];

const KEY="newmac-launch-v1";
const app=document.getElementById("app");
let done = new Set(JSON.parse(localStorage.getItem(KEY)||"[]"));
const ALL=[]; PHASES.forEach(p=>p.items.forEach(i=>ALL.push(i.id)));

const check = `<svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6"/></svg>`;
function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}

PHASES.forEach((p,pi)=>{
  const sec=document.createElement("section"); sec.className="phase"; sec.dataset.p=pi;
  sec.innerHTML=`<div class="phead"><div class="badge"><span>${pi}</span></div>
    <div><div class="ptitle">${esc(p.t)}</div><div class="psub">${esc(p.s)}</div></div></div><ul></ul>`;
  const ul=sec.querySelector("ul");
  p.items.forEach(it=>{
    const li=document.createElement("li"); li.className="item"; li.dataset.id=it.id;
    let html=`<div class="box" role="checkbox" tabindex="0" aria-checked="false">${check}</div>
      <div class="body"><div class="txt">${esc(it.x)}</div>`;
    if(it.n) html+=`<div class="note">${it.n}</div>`;
    if(it.c) html+=`<div class="code"><button class="copy">copy</button><pre>${esc(it.c)}</pre></div>`;
    html+=`</div>`; li.innerHTML=html; ul.appendChild(li);
    const toggle=()=>{ done.has(it.id)?done.delete(it.id):done.add(it.id); save(); };
    li.querySelector(".box").addEventListener("click",toggle);
    li.querySelector(".txt").addEventListener("click",toggle);
    li.querySelector(".box").addEventListener("keydown",e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle();}});
    if(it.c){const b=li.querySelector(".copy");b.addEventListener("click",()=>{
      navigator.clipboard.writeText(it.c).then(()=>{b.textContent="copied";b.classList.add("copied");setTimeout(()=>{b.textContent="copy";b.classList.remove("copied")},1400)});
    });}
  });
  app.appendChild(sec);
});

const finale=document.createElement("div"); finale.className="finale"; finale.id="finale";
finale.innerHTML=`<h2>🎉 You're set up.</h2><p>New machine, same brain. Go make something.</p>`;
app.appendChild(finale);
const foot=document.createElement("footer");
foot.innerHTML=`Mirrors <code>FIRST-RUN.md</code> · <a href="https://github.com/martinlaws/dotfiles">martinlaws/dotfiles</a>`;
app.appendChild(foot);

const fill=document.getElementById("fill"), pct=document.getElementById("pct"), count=document.getElementById("count");
let wasComplete = done.size>=ALL.length;
function render(){
  document.querySelectorAll("li.item").forEach(li=>{
    const on=done.has(li.dataset.id);
    li.classList.toggle("checked",on);
    li.querySelector(".box").setAttribute("aria-checked",on);
  });
  document.querySelectorAll(".phase").forEach((sec,pi)=>{
    sec.classList.toggle("done", PHASES[pi].items.every(i=>done.has(i.id)));
  });
  const n=[...done].filter(id=>ALL.includes(id)).length, pc=Math.round(n/ALL.length*100);
  fill.style.width=pc+"%"; pct.textContent=pc+"%"; count.textContent=n+" / "+ALL.length;
  const complete=n>=ALL.length;
  finale.classList.toggle("on",complete);
  if(complete && !wasComplete) burst();
  wasComplete=complete;
}
function save(){ localStorage.setItem(KEY,JSON.stringify([...done])); render(); }
document.getElementById("reset").addEventListener("click",()=>{
  if(confirm("Clear all progress?")){done.clear();save();}
});
render();

/* tiny confetti */
function burst(){
  const c=document.getElementById("cf"),x=c.getContext("2d");
  c.width=innerWidth;c.height=innerHeight;
  const cols=["#ff8a5b","#ff5c8a","#a06bff","#37d399","#ffd166"];
  const P=Array.from({length:160},()=>({x:innerWidth/2,y:innerHeight*0.3,
    vx:(Math.random()-.5)*14,vy:Math.random()*-15-4,g:.4+Math.random()*.3,
    s:5+Math.random()*7,c:cols[~~(Math.random()*cols.length)],r:Math.random()*6,vr:(Math.random()-.5)*.4}));
  let t=0;(function loop(){x.clearRect(0,0,c.width,c.height);t++;
    P.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;
      x.save();x.translate(p.x,p.y);x.rotate(p.r);x.fillStyle=p.c;x.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);x.restore();});
    if(t<160)requestAnimationFrame(loop);else x.clearRect(0,0,c.width,c.height);
  })();
}
</script>
</body>
</html>
