name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Gate: hard errors fail the build. (Baseline verified clean 2026-06-10.)
      - name: shellcheck (errors — blocking)
        run: |
          shellcheck --severity=error setup scripts/*.sh scripts/lib/*.sh dotfiles/bin/.bin/*.sh

      # Report: warnings are visible in the log but never fail the build.
      # These scripts only really run on fresh machines — tighten over time.
      - name: shellcheck (warnings — informational)
        continue-on-error: true
        run: |
          shellcheck --severity=warning setup scripts/*.sh scripts/lib/*.sh dotfiles/bin/.bin/*.sh
